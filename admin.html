<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم - Dr. Ameed</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--dark:#0D0D1A;--dark2:#131325;--dark3:#1A1A32;--text-light:#E8E0D0;--text-muted:#9A9080;--green:#25a244;--red:#e05555;--orange:#e09020;}
  body{font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text-light);min-height:100vh;direction:rtl;}

  /* LOGIN */
  .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 70% 50% at 30% 30%,rgba(201,168,76,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 60% at 80% 80%,rgba(201,168,76,0.07) 0%,transparent 60%);}
  .login-card{background:linear-gradient(145deg,rgba(26,26,50,0.98),rgba(19,19,37,0.99));border:1px solid rgba(201,168,76,0.25);border-radius:24px;width:100%;max-width:400px;padding:2.5rem 2rem;box-shadow:0 30px 80px rgba(0,0,0,0.7);}
  .login-logo{text-align:center;margin-bottom:2rem;}
  .login-title{font-family:'Amiri',serif;font-size:1.6rem;color:var(--gold-light);text-align:center;margin-bottom:0.4rem;}
  .login-sub{text-align:center;color:var(--text-muted);font-size:0.85rem;margin-bottom:2rem;}
  .form-label{display:block;font-size:0.85rem;color:var(--gold);margin-bottom:0.4rem;font-weight:500;}
  .form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:0.85rem 1rem;color:var(--text-light);font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;transition:all 0.3s;margin-bottom:1.25rem;}
  .form-input:focus{border-color:var(--gold);background:rgba(201,168,76,0.06);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
  .btn-gold{width:100%;background:linear-gradient(135deg,#B8922A,#E8C97A,#B8922A);background-size:200% 100%;border:none;border-radius:14px;padding:1rem;color:#0D0D1A;font-family:'Tajawal',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;transition:all 0.3s;}
  .btn-gold:hover{background-position:100% 0;box-shadow:0 8px 30px rgba(201,168,76,0.4);transform:translateY(-2px);}
  .login-error{color:#e06060;font-size:0.85rem;text-align:center;margin-bottom:1rem;display:none;}
  .login-error.show{display:block;}

  /* DASHBOARD */
  .dashboard{display:none;}
  .topbar{background:linear-gradient(135deg,rgba(26,26,50,0.98),rgba(19,19,37,0.99));border-bottom:1px solid rgba(201,168,76,0.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold-light);display:flex;align-items:center;gap:0.75rem;}
  .topbar-badge{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:0.3rem 0.75rem;font-size:0.8rem;color:var(--gold);}
  .logout-btn{background:transparent;border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:0.5rem 1rem;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.3s;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}

  .main{padding:2rem;}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
  .stat-card{background:linear-gradient(145deg,rgba(26,26,50,0.9),rgba(19,19,37,0.95));border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:1.25rem 1.5rem;text-align:center;}
  .stat-num{font-size:2rem;font-weight:800;margin-bottom:0.2rem;}
  .stat-label{font-size:0.8rem;color:var(--text-muted);}
  .stat-card.total .stat-num{color:var(--gold-light);}
  .stat-card.pending .stat-num{color:var(--orange);}
  .stat-card.confirmed .stat-num{color:var(--green);}
  .stat-card.cancelled .stat-num{color:var(--red);}

  /* FILTERS */
  .filters-row{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
  .filter-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:0.5rem 1.1rem;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:0.88rem;cursor:pointer;transition:all 0.25s;}
  .filter-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--text-light);}
  .filter-btn.active{border-color:var(--gold);background:rgba(201,168,76,0.12);color:var(--gold-light);font-weight:600;}
  .search-input{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:0.5rem 1rem;color:var(--text-light);font-family:'Tajawal',sans-serif;font-size:0.88rem;outline:none;transition:all 0.25s;margin-right:auto;min-width:200px;}
  .search-input:focus{border-color:var(--gold);background:rgba(201,168,76,0.06);}
  .search-input::placeholder{color:var(--text-muted);}
  .refresh-btn{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:10px;padding:0.5rem 1rem;color:var(--gold);font-family:'Tajawal',sans-serif;font-size:0.88rem;cursor:pointer;transition:all 0.25s;}
  .refresh-btn:hover{background:rgba(201,168,76,0.2);}

  /* TABLE */
  .table-wrap{background:linear-gradient(145deg,rgba(26,26,50,0.9),rgba(19,19,37,0.95));border:1px solid rgba(201,168,76,0.15);border-radius:18px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:1px solid rgba(201,168,76,0.2);}
  th{padding:1rem 1.25rem;text-align:right;font-size:0.82rem;color:var(--gold);font-weight:600;white-space:nowrap;}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.2s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(201,168,76,0.04);}
  td{padding:1rem 1.25rem;font-size:0.88rem;vertical-align:top;}
  .td-name{font-weight:600;color:var(--text-light);}
  .td-phone{color:var(--text-muted);font-size:0.82rem;direction:ltr;text-align:right;}
  .td-service{color:var(--gold-light);}
  .td-complaints{color:var(--text-muted);font-size:0.8rem;max-width:160px;line-height:1.5;}
  .td-time{color:var(--text-light);font-size:0.85rem;line-height:1.6;}
  .td-date{color:var(--text-muted);font-size:0.78rem;}

  /* STATUS BADGE */
  .badge{display:inline-flex;align-items:center;gap:0.3rem;border-radius:8px;padding:0.3rem 0.7rem;font-size:0.78rem;font-weight:600;white-space:nowrap;}
  .badge-pending{background:rgba(224,144,32,0.15);color:var(--orange);border:1px solid rgba(224,144,32,0.3);}
  .badge-confirmed{background:rgba(37,162,68,0.15);color:var(--green);border:1px solid rgba(37,162,68,0.3);}
  .badge-cancelled{background:rgba(224,85,85,0.15);color:var(--red);border:1px solid rgba(224,85,85,0.3);}

  /* ACTION BUTTONS */
  .actions{display:flex;gap:0.4rem;flex-wrap:wrap;}
  .act-btn{border:none;border-radius:8px;padding:0.35rem 0.7rem;font-family:'Tajawal',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .act-confirm{background:rgba(37,162,68,0.15);color:var(--green);border:1px solid rgba(37,162,68,0.25);}
  .act-confirm:hover{background:rgba(37,162,68,0.3);}
  .act-cancel{background:rgba(224,144,32,0.12);color:var(--orange);border:1px solid rgba(224,144,32,0.25);}
  .act-cancel:hover{background:rgba(224,144,32,0.25);}
  .act-delete{background:rgba(224,85,85,0.1);color:var(--red);border:1px solid rgba(224,85,85,0.2);}
  .act-delete:hover{background:rgba(224,85,85,0.25);}
  .act-wa{background:rgba(37,162,68,0.1);color:#25a244;border:1px solid rgba(37,162,68,0.2);}
  .act-wa:hover{background:rgba(37,162,68,0.25);}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted);}
  .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.5;}

  /* LOADING */
  .loading-row td{text-align:center;padding:3rem;color:var(--text-muted);}
  .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.75rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(26,26,50,0.98);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:0.85rem 1.5rem;color:var(--gold-light);font-family:'Tajawal',sans-serif;font-size:0.9rem;z-index:999;transition:transform 0.4s ease;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:768px){
    .stats-grid{grid-template-columns:1fr 1fr;}
    .main{padding:1rem;}
    .topbar{padding:1rem;}
    th:nth-child(4),td:nth-child(4){display:none;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 100 100" width="70" height="70" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F5E0A0"/><stop offset="50%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#A07828"/></linearGradient></defs>
        <path d="M50 8 C38 8,20 16,18 32 C16 44,22 52,26 60 C30 68,30 80,36 88 C39 93,44 94,47 90 C49 86,49 78,50 74 C51 78,51 86,53 90 C56 94,61 93,64 88 C70 80,70 68,74 60 C78 52,84 44,82 32 C80 16,62 8,50 8Z" fill="url(#g)"/>
      </svg>
    </div>
    <div class="login-title">لوحة تحكم الدكتور</div>
    <div class="login-sub">Dr. Ameed Dental Clinic</div>
    <div class="login-error" id="loginError">كلمة المرور غير صحيحة</div>
    <label class="form-label">كلمة المرور</label>
    <input class="form-input" type="password" id="passInput" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-gold" onclick="doLogin()">دخول ←</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboardPage">
  <div class="topbar">
    <div class="topbar-title">
      🦷 لوحة تحكم Dr. Ameed
      <span class="topbar-badge" id="totalBadge">0 حجز</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">خروج ✕</button>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card total"><div class="stat-num" id="sTotal">0</div><div class="stat-label">إجمالي الحجوزات</div></div>
      <div class="stat-card pending"><div class="stat-num" id="sPending">0</div><div class="stat-label">قيد الانتظار</div></div>
      <div class="stat-card confirmed"><div class="stat-num" id="sConfirmed">0</div><div class="stat-label">مؤكدة</div></div>
      <div class="stat-card cancelled"><div class="stat-num" id="sCancelled">0</div><div class="stat-label">ملغاة</div></div>
    </div>

    <!-- FILTERS -->
    <div class="filters-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">⏳ انتظار</button>
      <button class="filter-btn" onclick="setFilter('confirmed',this)">✅ مؤكد</button>
      <button class="filter-btn" onclick="setFilter('cancelled',this)">❌ ملغي</button>
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 بحث باسم المريض..." oninput="renderTable()"/>
      <button class="refresh-btn" onclick="loadData()">↻ تحديث</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>المريض</th>
            <th>الخدمة</th>
            <th>الشكوى</th>
            <th>الموعد</th>
            <th>الحالة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="6"><div class="spinner"></div>جاري التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL='https://mcyymirzzefhhutiofsw.supabase.co';
  const SUPABASE_KEY='sb_publishable_gSMMGTXUMBxeae4pOjJJUw_lfFHARue';
  const ADMIN_PASS='Ameed2024';
  const WA='972595201014';

  let allData=[];
  let currentFilter='all';

  function doLogin(){
    const v=document.getElementById('passInput').value;
    if(v===ADMIN_PASS){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('dashboardPage').style.display='block';
      loadData();
    } else {
      document.getElementById('loginError').classList.add('show');
      document.getElementById('passInput').value='';
    }
  }

  function doLogout(){
    document.getElementById('loginPage').style.display='flex';
    document.getElementById('dashboardPage').style.display='none';
    document.getElementById('passInput').value='';
  }

  async function loadData(){
    document.getElementById('tableBody').innerHTML='<tr class="loading-row"><td colspan="6"><div class="spinner"></div>جاري التحميل...</td></tr>';
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/appointments?select=*&order=created_at.desc`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
      });
      allData=await r.json();
      updateStats();
      renderTable();
    } catch(e){
      document.getElementById('tableBody').innerHTML='<tr class="loading-row"><td colspan="6">⚠️ تعذر الاتصال بقاعدة البيانات</td></tr>';
    }
  }

  function updateStats(){
    const total=allData.length;
    const pending=allData.filter(a=>a.status==='pending').length;
    const confirmed=allData.filter(a=>a.status==='confirmed').length;
    const cancelled=allData.filter(a=>a.status==='cancelled').length;
    document.getElementById('sTotal').textContent=total;
    document.getElementById('sPending').textContent=pending;
    document.getElementById('sConfirmed').textContent=confirmed;
    document.getElementById('sCancelled').textContent=cancelled;
    document.getElementById('totalBadge').textContent=total+' حجز';
  }

  function setFilter(f,btn){
    currentFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable(){
    const search=document.getElementById('searchInput').value.trim().toLowerCase();
    let data=allData;
    if(currentFilter!=='all')data=data.filter(a=>a.status===currentFilter);
    if(search)data=data.filter(a=>a.patient_name.toLowerCase().includes(search)||a.patient_phone.includes(search));
    if(data.length===0){
      document.getElementById('tableBody').innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div>لا توجد حجوزات</div></td></tr>';
      return;
    }
    document.getElementById('tableBody').innerHTML=data.map(a=>rowHTML(a)).join('');
  }

  function statusBadge(s){
    if(s==='confirmed')return '<span class="badge badge-confirmed">✅ مؤكد</span>';
    if(s==='cancelled')return '<span class="badge badge-cancelled">❌ ملغي</span>';
    return '<span class="badge badge-pending">⏳ انتظار</span>';
  }

  function fmtDate(d){
    const dt=new Date(d);
    return dt.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+dt.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  }

  function rowHTML(a){
    return `<tr>
      <td><div class="td-name">${a.patient_name}</div><div class="td-phone">${a.patient_phone}</div><div class="td-date">${fmtDate(a.created_at)}</div></td>
      <td class="td-service">${a.service}</td>
      <td class="td-complaints">${a.complaints}</td>
      <td class="td-time"><strong>${a.preferred_day}</strong><br/>${a.preferred_time}${a.note?'<br/><span style="color:var(--text-muted);font-size:0.78rem">📝 '+a.note+'</span>':''}</td>
      <td>${statusBadge(a.status)}</td>
      <td><div class="actions">
        ${a.status!=='confirmed'?`<button class="act-btn act-confirm" onclick="updateStatus(${a.id},'confirmed')">✅ تأكيد</button>`:''}
        ${a.status!=='cancelled'?`<button class="act-btn act-cancel" onclick="updateStatus(${a.id},'cancelled')">❌ إلغاء</button>`:''}
        <button class="act-btn act-wa" onclick="waCall('${a.patient_name}','${a.patient_phone}','${a.preferred_day}','${a.preferred_time}')">واتساب</button>
        <button class="act-btn act-delete" onclick="deleteRow(${a.id})">🗑</button>
      </div></td>
    </tr>`;
  }

  async function updateStatus(id,status){
    await fetch(`${SUPABASE_URL}/rest/v1/appointments?id=eq.${id}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},
      body:JSON.stringify({status})
    });
    allData=allData.map(a=>a.id===id?{...a,status}:a);
    updateStats();renderTable();
    showToast(status==='confirmed'?'✅ تم تأكيد الموعد':'❌ تم إلغاء الموعد');
  }

  async function deleteRow(id){
    if(!confirm('هل تريد حذف هذا الحجز؟'))return;
    await fetch(`${SUPABASE_URL}/rest/v1/appointments?id=eq.${id}`,{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    allData=allData.filter(a=>a.id!==id);
    updateStats();renderTable();
    showToast('🗑 تم حذف الحجز');
  }

  function waCall(name,phone,day,time){
    const msg=`السلام عليكم ${name}،\nبخصوص موعدك في عيادة Dr. Ameed يوم ${day} الساعة ${time}.\nنتطلع لرؤيتك! 🦷`;
    window.open(`https://wa.me/${phone.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
</body>
</html>
